<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clear Face Data</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #090a0d;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 24px;
        }

        .card {
            max-width: 420px;
            padding: 24px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
        }

        button,
        a {
            display: block;
            width: 100%;
            margin-top: 14px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #19c37d;
            color: #000;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
        }

        a {
            background: white;
        }

        p {
            color: #cfd3dc;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Clear Local Face Data</h1>
        <p>This will remove old browser/localStorage face registration data from this browser.</p>

        <button onclick="clearData()">Clear Local Data</button>

        <a href="./register.html?v=18">Go to Register</a>
        <a href="./verify.html?v=18">Go to Verify</a>

        <p id="status"></p>
    </div>

    <script>
        function clearData() {
            localStorage.removeItem("face_attendance_registered_users");

            document.getElementById("status").textContent =
                "Old local face data cleared successfully.";
        }
    </script>
</body>

</html>
